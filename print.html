<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>EM Dashboard — Sentry Trend Export</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #fff;
      color: #0f172a;
      padding: 36px 48px;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── Print instructions banner (screen only) ── */
    .print-hint {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 28px;
      font-size: 13px;
      color: #1e40af;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .print-hint strong { font-weight: 600; }
    @media print { .print-hint { display: none !important; } }

    /* ── Header ── */
    .export-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid #e2e8f0;
    }
    .export-title { font-size: 22px; font-weight: 700; color: #0f172a; margin-bottom: 4px; }
    .export-meta { font-size: 12px; color: #64748b; }
    .export-badge {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      color: #475569;
      white-space: nowrap;
      margin-top: 2px;
    }

    /* ── Summary cards ── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .summary-card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px 14px;
      text-align: center;
    }
    .summary-value { font-size: 22px; font-weight: 700; color: #1e293b; }
    .summary-label { font-size: 10px; font-weight: 600; color: #94a3b8; letter-spacing: 0.4px; text-transform: uppercase; margin-top: 2px; }
    .summary-card.up .summary-value   { color: #ea580c; }
    .summary-card.down .summary-value { color: #16a34a; }

    /* ── Chart section ── */
    .chart-section {
      margin-bottom: 28px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 16px 20px;
    }
    .chart-section h2 { font-size: 11px; font-weight: 600; color: #94a3b8; letter-spacing: 0.4px; text-transform: uppercase; margin-bottom: 12px; }
    #chart-container svg { display: block; width: 100%; }

    /* ── Data table ── */
    .table-section { margin-bottom: 20px; }
    .table-section h2 { font-size: 11px; font-weight: 600; color: #94a3b8; letter-spacing: 0.4px; text-transform: uppercase; margin-bottom: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      background: #f1f5f9;
      padding: 8px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      border-bottom: 1px solid #e2e8f0;
    }
    tbody tr:nth-child(even) { background: #f8fafc; }
    tbody td { padding: 7px 12px; border-bottom: 1px solid #f1f5f9; color: #334155; }
    .td-date { font-weight: 500; color: #1e293b; }
    .td-count { font-weight: 700; text-align: right; }
    .td-delta { text-align: right; font-weight: 600; }
    .td-delta.up   { color: #ea580c; }
    .td-delta.down { color: #16a34a; }
    .td-delta.flat { color: #94a3b8; }
    .td-gap { background: #fafafa; }
    .td-gap td { color: #94a3b8; font-style: italic; font-size: 12px; }

    /* ── Footer ── */
    .export-footer {
      margin-top: 24px;
      padding-top: 14px;
      border-top: 1px solid #e2e8f0;
      font-size: 11px;
      color: #94a3b8;
      display: flex;
      justify-content: space-between;
    }

    @media print {
      body { padding: 20px 28px; }
      .chart-section, .summary-card { background: #f8fafc !important; }
      @page { margin: 1.5cm; size: A4 landscape; }
    }
  </style>
</head>
<body>

  <div class="print-hint">
    💡 <span><strong>To save as PDF:</strong> Press <strong>Ctrl+P</strong> (Windows) or <strong>Cmd+P</strong> (Mac) → set destination to <strong>"Save as PDF"</strong> → click Save. For best results use <em>Landscape</em> orientation.</span>
  </div>

  <div class="export-header">
    <div>
      <div class="export-title" id="exp-title">Sentry Issue Trend</div>
      <div class="export-meta" id="exp-meta"></div>
    </div>
    <div class="export-badge" id="exp-badge"></div>
  </div>

  <div class="summary-grid" id="summary-grid"></div>

  <div class="chart-section">
    <h2>Issue Count — Last 30 Days</h2>
    <div id="chart-container"></div>
  </div>

  <div class="table-section">
    <h2>Daily Readings</h2>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Day</th>
          <th style="text-align:right">Issues</th>
          <th style="text-align:right">vs Prev Day</th>
        </tr>
      </thead>
      <tbody id="data-tbody"></tbody>
    </table>
  </div>

  <div class="export-footer">
    <span id="footer-view"></span>
    <span>EM Dashboard · Powered by Zeal</span>
  </div>

<script src="print.js"></script>
</body>
</html>
