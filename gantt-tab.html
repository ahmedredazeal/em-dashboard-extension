<!DOCTYPE html>
<html lang="en">
<head>
  <script src="theme-loader.js"></script>
  <meta charset="UTF-8"/>
  <title>Zealer Dashboard — Sprint Gantt</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --text: #111827; --text-muted: #6b7280; --border: #e5e7eb;
      --surface: #ffffff; --primary: #2563EB;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px; color: var(--text);
    }
    body { padding: 16px 20px; min-width: 0; background: #fff; }
    #gantt-tab-container { overflow-x: auto; }
    @media screen { #gantt-tab-container { min-width: 1400px; } }

    .print-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding-bottom: 14px; border-bottom: 2px solid #111827; margin-bottom: 18px;
    }
    .print-title { font-size: 16px; font-weight: 700; }
    .print-meta  { font-size: 12px; color: #6b7280; margin-top: 3px; line-height: 1.5; }
    .print-logo  { display: flex; align-items: center; gap: 8px; }
    .print-logo img { width: 28px; height: 28px; border-radius: 7px; }
    .print-logo-text { font-size: 11px; color: #6b7280; }

    .status { padding: 40px; text-align: center; color: #6b7280; font-size: 14px; }

    .print-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 20px; background: #2563EB; color: #fff;
      border: none; border-radius: 6px; font-size: 13px; font-weight: 500;
      cursor: pointer; margin-bottom: 10px;
    }
    .print-btn:hover { background: #1d4ed8; }
    .hint { font-size: 11px; color: #6b7280; margin-bottom: 20px; }

    .zeal-footer {
      margin-top: 24px; padding-top: 10px; border-top: 1px solid #e5e7eb;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      font-size: 11px; color: #9ca3af;
    }

    @media print {
      body { padding: 12px 16px; }
      .no-print { display: none !important; }
      @page { margin: 6mm 8mm; size: A3 landscape; }
      #gantt-tab-container { overflow: visible !important; min-width: 0 !important; }
    }
  </style>
</head>
<body>

  <button class="print-btn no-print" id="print-btn">⎙ Save as PDF / Print</button>
  <p class="hint no-print">Tip: In the print dialog, choose A3 landscape and set margins to "None" for a full-width chart.</p>

  <div class="print-header">
    <div>
      <div class="print-title" id="print-title">Sprint Gantt</div>
      <div class="print-meta" id="print-meta"></div>
    </div>
    <div class="print-logo">
      <img src="icons/icon48.png" alt="Zealer Dashboard"/>
      <div>
        <div style="font-size:12px;font-weight:600;">Zealer Dashboard</div>
        <div class="print-logo-text">Powered by Zeal</div>
      </div>
    </div>
  </div>

  <div id="gantt-tab-container">
    <div class="status" id="status">Loading sprint…</div>
  </div>

  <div class="zeal-footer">
    <span>Powered by Zeal</span>
    <span id="print-generated" style="margin-left:auto;"></span>
  </div>

  <!-- External script — required by Chrome extension CSP (no inline scripts) -->
  <script src="gantt-tab.js" type="module"></script>
</body>
</html>
